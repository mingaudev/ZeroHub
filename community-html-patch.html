<!--
  ════════════════════════════════════════════════════════
  PATCH: substitua no index.html os blocos:
    <!-- COMMUNITY BUTTON (floating left) --> ... </button>
    <!-- COMMUNITY PANEL --> ... </div>
    <!-- MODAL NEW THREAD --> ... </div>
  pelo HTML abaixo.

  Também adicione no <head>, APÓS o style.css:
    <link rel="stylesheet" href="/community.css"/>
  ════════════════════════════════════════════════════════
-->

<!-- COMMUNITY FAB -->
<button id="community-fab" title="Abrir comunidade">
  <span class="fab-icon">💬</span>
  <span id="community-fab-label">Comunidade</span>
  <span id="community-unread" class="community-unread hidden">0</span>
</button>

<!-- OVERLAY -->
<div id="community-overlay"></div>

<!-- COMMUNITY PANEL (Discord layout) -->
<div id="community-panel">

  <!-- SIDEBAR -->
  <aside class="dc-sidebar">
    <div class="dc-server-header">
      <span class="dc-server-name">NODE ZERO</span>
      <span class="dc-server-chevron">▾</span>
    </div>

    <div class="dc-sidebar-section">
      <div class="dc-section-label">
        Canais de texto
        <button class="dc-section-add" id="dc-btn-new-thread" title="Nova thread">＋</button>
      </div>
    </div>
    <div class="dc-channel-list" id="dc-channel-list">
      <!-- Populado por JS -->
    </div>

    <div class="dc-sidebar-footer">
      <div class="dc-user-avatar" id="dc-sidebar-avatar">?</div>
      <div class="dc-user-info">
        <div class="dc-user-name" id="dc-sidebar-username">Visitante</div>
        <div class="dc-user-status" id="dc-sidebar-status">Não logado</div>
      </div>
      <button class="dc-user-login hidden" id="dc-sidebar-login-btn">Entrar</button>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <div class="dc-main">

    <!-- HEADER -->
    <div class="dc-chat-header">
      <div class="dc-chat-header-left">
        <span class="dc-chat-channel-icon">#</span>
        <span class="dc-chat-channel-name" id="dc-active-channel-name">geral</span>
        <span class="dc-chat-channel-desc" id="dc-active-channel-desc"></span>
      </div>
      <div class="dc-chat-header-right">
        <button class="dc-header-btn" id="dc-btn-new-thread-header" title="Nova thread">＋ Thread</button>
        <button class="dc-close-btn" id="community-close" title="Fechar">✕</button>
      </div>
    </div>

    <!-- THREAD LIST VIEW -->
    <div id="dc-thread-list-view">
      <!-- Threads renderizadas por JS -->
    </div>

    <!-- THREAD DETAIL VIEW (hidden by default) -->
    <div id="dc-thread-detail-view" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <!-- OP post -->
      <div class="dc-thread-detail-op" id="dc-op-area"></div>
      <!-- Messages / replies -->
      <div class="dc-messages" id="dc-messages-area"></div>
      <!-- Input -->
      <div class="dc-input-area" id="dc-input-area">
        <div class="dc-input-box">
          <div class="dc-paste-previews" id="dc-paste-previews"></div>
          <div class="dc-input-row">
            <textarea id="dc-reply-input" placeholder="Responder... (Ctrl+V para colar imagem)" rows="1"></textarea>
            <div class="dc-input-actions">
              <button class="dc-input-btn" id="dc-emoji-trigger" title="Emoji">😀</button>
              <button class="dc-send-btn" id="dc-send-btn">Enviar</button>
            </div>
          </div>
        </div>
        <div class="dc-login-prompt hidden" id="dc-login-prompt">
          <button id="dc-prompt-login-btn">Faça login para participar</button>
        </div>
      </div>
    </div>

  </div><!-- /.dc-main -->
</div><!-- /#community-panel -->

<!-- NEW THREAD MODAL -->
<div id="modal-thread" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="close-thread">×</button>
    <h3>✏️ Nova thread</h3>
    <input type="text" id="thread-title" placeholder="Título da thread *" style="user-select:text;-webkit-user-select:text;"/>
    <div id="thread-body-editor" class="rich-editor" contenteditable="true"
         data-placeholder="Escreva algo... (Ctrl+V para colar imagens)"
         style="min-height:80px;"></div>
    <label class="upload-label">
      <span id="thread-img-text">🖼️ Adicionar imagens</span>
      <input type="file" id="thread-images" accept="image/*" multiple/>
    </label>
    <div id="thread-img-preview" class="dc-new-thread-paste-previews"></div>
    <div class="form-error" id="thread-err"></div>
    <button class="btn-primary w100" id="do-thread">Publicar thread</button>
  </div>
</div>

<!-- COMMUNITY EMOJI PICKER -->
<div id="community-emoji-picker"></div>
