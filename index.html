<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NODE ZERO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-logo">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="intro-svg">
      <polygon id="h1" points="100,18 163,55 163,129 100,166 37,129 37,55" fill="#3B8BEB"/>
      <polygon id="h2" points="100,36 147,63 147,117 100,144 53,117 53,63" fill="#F4622A"/>
      <polygon id="h3" points="100,54 131,71 131,105 100,122 69,105 69,71" fill="#25B87A"/>
      <polygon id="h4" points="100,72 115,81 115,99 100,108 85,99 85,81" fill="#F9C623"/>
      <polygon id="h5" points="100,84 108,89 108,111 100,116 92,111 92,89" fill="#fff"/>
      <circle id="hc" cx="100" cy="100" r="10" fill="#3B8BEB"/>
      <circle cx="100" cy="100" r="4" fill="#fff"/>
    </svg>
  </div>
  <div id="intro-name">NODE ZERO</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <svg viewBox="0 0 40 40" width="32" height="32">
        <polygon points="20,3 35,11 35,29 20,37 5,29 5,11" fill="#3B8BEB"/>
        <polygon points="20,9 29,14 29,26 20,31 11,26 11,14" fill="#F4622A"/>
        <polygon points="20,15 25,18 25,22 20,25 15,22 15,18" fill="#F9C623"/>
        <circle cx="20" cy="20" r="3" fill="#fff"/>
      </svg>
      <span>NODE ZERO</span>
    </div>
    <div class="nav-right">
      <span id="nav-user"></span>
      <button id="btn-auth" class="btn-outline">Entrar</button>
      <button id="btn-logout" class="btn-ghost hidden">Sair</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-content">
      <h1>Jogos feitos<br/><span class="accent">com paixão</span></h1>
      <p>Explore, jogue e descubra os projetos do NODE ZERO studio.</p>
    </div>
    <button id="btn-hero-edit" class="btn-hero-edit hidden" title="Editar banner">✏️</button>
  </section>

  <!-- MINGAU CONTROLS -->
  <div id="mingau-panel" class="hidden container">
    <div class="mingau-controls">
      <button id="btn-add" class="btn-primary">+ Adicionar jogo</button>
      <button id="btn-stats" class="btn-outline">📊 Estatísticas</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="container filter-bar">
    <div class="view-toggle">
      <button class="view-btn active" data-view="grid" title="Grid">⊞</button>
      <button class="view-btn" data-view="list" title="Lista">☰</button>
    </div>
    <div class="tag-filters" id="tag-filters"></div>
  </div>

  <!-- POSTS GRID -->
  <main class="container" id="posts-container">
    <div id="posts-grid"></div>
    <div id="empty-state" class="hidden">
      <p>Nenhum jogo cadastrado ainda.</p>
    </div>
  </main>

</div>

<!-- MODAL AUTH -->
<div id="modal-auth" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="close-auth">×</button>
    <div class="modal-tabs">
      <button class="tab active" data-tab="login">Entrar</button>
      <button class="tab" data-tab="register">Cadastrar</button>
    </div>
    <div id="tab-login" class="tab-content">
      <input type="text" id="login-user" placeholder="Nome de usuário"/>
      <input type="password" id="login-pass" placeholder="Senha"/>
      <div class="form-error" id="login-err"></div>
      <button class="btn-primary w100" id="do-login">Entrar</button>
    </div>
    <div id="tab-register" class="tab-content hidden">
      <input type="text" id="reg-user" placeholder="Escolha um nome"/>
      <input type="password" id="reg-pass" placeholder="Senha"/>
      <div class="form-error" id="reg-err"></div>
      <button class="btn-primary w100" id="do-register">Cadastrar</button>
    </div>
  </div>
</div>

<!-- MODAL ADD/EDIT POST -->
<div id="modal-post" class="modal hidden">
  <div class="modal-box modal-box-wide">
    <button class="modal-close" id="close-post">×</button>
    <h3 id="modal-post-title">Adicionar jogo</h3>

    <div class="form-grid">
      <div class="form-col">
        <label class="form-label">Título *</label>
        <input type="text" id="post-title" placeholder="Nome do jogo"/>

        <label class="form-label">URL principal</label>
        <input type="url" id="post-url" placeholder="https://..."/>

        <label class="form-label">Descrição curta</label>
        <textarea id="post-desc" placeholder="Descrição curta do card" rows="2"></textarea>

        <label class="form-label">Descrição completa</label>
        <textarea id="post-long-desc" placeholder="Descrição detalhada para a página do jogo" rows="4"></textarea>

        <label class="form-label">Tags (pressione Enter para adicionar)</label>
        <div class="tag-input-wrap">
          <div class="tags-preview" id="tags-preview"></div>
          <input type="text" id="tag-input" placeholder="ex: mobile, PC, jam..."/>
        </div>
      </div>

      <div class="form-col">
        <label class="form-label">Thumbnail</label>
        <label class="upload-label">
          <span id="upload-text">📎 Adicionar thumbnail</span>
          <input type="file" id="post-thumb" accept="image/*"/>
        </label>
        <div id="thumb-preview"></div>

        <label class="form-label">Screenshots (múltiplas)</label>
        <label class="upload-label">
          <span id="upload-screens-text">🖼️ Adicionar screenshots</span>
          <input type="file" id="post-screens" accept="image/*" multiple/>
        </label>
        <div id="screens-preview" class="screens-preview"></div>

        <label class="form-label">Links adicionais</label>
        <div id="extra-links">
          <div class="extra-link-row">
            <input type="text" class="link-label" placeholder="Label (ex: itch.io)"/>
            <input type="url" class="link-url" placeholder="URL"/>
            <button class="btn-remove-link" type="button">×</button>
          </div>
        </div>
        <button class="btn-ghost btn-add-link" id="btn-add-link" type="button">+ Adicionar link</button>
      </div>
    </div>

    <div class="form-error" id="post-err"></div>
    <button class="btn-primary w100" id="do-post">Publicar</button>
  </div>
</div>

<!-- MODAL DETAIL -->
<div id="modal-detail" class="modal hidden">
  <div class="modal-box modal-box-detail">
    <button class="modal-close" id="close-detail">×</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- MODAL STATS -->
<div id="modal-stats" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="close-stats">×</button>
    <h3>📊 Estatísticas</h3>
    <div id="stats-content" class="stats-grid"></div>
  </div>
</div>

<!-- MODAL HERO EDIT -->
<div id="modal-hero" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="close-hero">×</button>
    <h3>✏️ Editar Banner</h3>
    <label class="upload-label">
      <span>🖼️ Nova imagem de fundo</span>
      <input type="file" id="hero-img-input" accept="image/*"/>
    </label>
    <div id="hero-preview"></div>
    <button class="btn-primary w100" id="do-hero-save">Salvar banner</button>
    <button class="btn-ghost w100" id="do-hero-remove">🗑️ Remover banner</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/App.js"></script>
</body>
</html>
